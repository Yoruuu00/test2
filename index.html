<!DOCTYPE html>
<html lang="en">
<head>
    <title id="rumah">Toko Buku</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="tiga.css">
    <script src="https://kit.fontawesome.com/a3c61f64a4.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</head>
<body>
    <header class="d-flex py-4 bg-body-tertiary">
        <nav class="navbar px-5 navbar-expand-lg bg-body-tertiary w-100">
            <div class="container-fluid">
              <a class="navbar-brand" href="#rumah">Toko Buku</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                  <li class="nav-item ">
                    <a class="nav-link active" aria-current="page" href="#Toko Buku">Home</a>
                  </li>
                  <li class="nav-item ">
                    <a class="nav-link" href="#pilihan">Books</a>
                  </li>
                  <li class="nav-item ">
                    <a class="nav-link" href="#panggil">Contact</a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
    </header>

   <main id="pilihan">
    <h1 class="text-center">Books</h1>
    <div class="d-flex justify-content-evenly">
      <div class="card" style="width: 18rem;">
        <img src="CantikItuLuka.jpg" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-text">Cantik Itu Luka</h5><br>
            <h7 class="card-text">Eka Kurniawan</h7><br>
            <p1 class="card-text">Rp.125.000.00</p1>
        </div>
      </div>
      <div class="card" style="width: 18rem;">
        <img src="LautBercerita.jpg" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-text">Laut Bercerita</h5><br>
          <h7 class="card-text">Leila S. Chudori</h7><br>
          <p1 class="card-text">Rp.105.000.00</p1>
        </div>
      </div>
      <div class="card" style="width: 18rem;">
        <img src="KeajaibanTokoKelontong Namiya.jpg" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-text">Keajaiban Toko Kelontong Namiya</h5><br>
          <h7 class="card-text">Keigo Higashino</h7><br>
          <p1 class="card-text">Rp.115.000.00</p1>
        </div>
      </div>
    </div>
   </main>

   <aside id="panggil">
    <h1 class="text-center">Contact Us</h1>
    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="floatingInputName" placeholder="name">
      <label for="floatingInputName">Name</label>
    </div>
    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="floatingInputEmail" placeholder="name@example.com">
      <label for="floatingInputEmail">Email address</label>
    </div>
    <div class="form-floating mb-3">
      <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextareaMessage" style="height: 100px"></textarea>
      <label for="floatingTextareaMessage">Messages</label>
    </div>
    <button type="submit" class="btn btn-primary" onclick="showAlert()">Submit</button>
   </aside>

   <footer class="text-center bg-body-tertiary py-4">
    Contact Us at: info@tokobuku.com
   </footer>

   <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
   <script src="dua.js"></script>

</body>
</html>
